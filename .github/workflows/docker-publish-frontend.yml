name: Release Docker Frontend

on:
  push:
    tags:
      - 'frontend-v*.*.*'  # Frontend releases only (frontend-v1.0.0)
  pull_request:
    branches: [ main ]
    paths:
      - 'frontend/**'
      - 'docker/frontend.Dockerfile'
      - 'frontend/package.json'
      - 'frontend/pnpm-lock.yaml'
      - '.github/workflows/docker-publish-frontend.yml'

  schedule:
    - cron: '0 10 * * *' # everyday at 10am

  # Allow job to be triggered manually.
  workflow_dispatch:

permissions: { }

# Cancel in-progress jobs when pushing to the same branch.
concurrency:
  cancel-in-progress: true
  group: ${{ github.workflow }}-${{ github.ref }}

# The name for the produced image at ghcr.io.
env:
  IMAGE_NAME_FRONTEND: "${{ github.repository }}-frontend"

jobs:
  build_and_test_frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Acquire sources
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4 # zizmor: ignore[cache-poisoning]

      - name: Build frontend image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/frontend.Dockerfile
          target: prod
          load: true
          tags: wd-frontend:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Computes the version/tags/labels once, shared by the per-platform build jobs
  # and the final manifest-merge job.
  docker_meta:
    needs: build_and_test_frontend
    runs-on: ubuntu-latest
    if: ${{ ! (startsWith(github.actor, 'dependabot') || github.event.pull_request.head.repo.fork ) }}
    outputs:
      tags: ${{ steps.meta.outputs.tags }}
      labels: ${{ steps.meta.outputs.labels }}

    steps:
      - name: Acquire sources
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Extract version from tag
        id: version
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          if [[ "$REF_NAME" =~ ^frontend-v(.+)$ ]]; then
            echo "version=${BASH_REMATCH[1]}" >> $GITHUB_OUTPUT
          else
            echo "version=latest" >> $GITHUB_OUTPUT
          fi

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: |
            ghcr.io/${{ env.IMAGE_NAME_FRONTEND }}
          tags: |
            type=schedule,pattern=nightly
            type=ref,event=pr
            type=semver,pattern={{version}},value=v${{ steps.version.outputs.version }}
            type=semver,pattern={{major}}.{{minor}},value=v${{ steps.version.outputs.version }}

      - name: Inspect meta # zizmor: ignore[template-injection]
        run: |
          echo "Tags:      ${{ steps.meta.outputs.tags }}"
          echo "Labels:    ${{ steps.meta.outputs.labels }}"

  # Builds each platform natively on its own runner (no QEMU emulation) and
  # pushes an untagged, digest-addressed image. linux/arm64 under QEMU
  # emulation on an amd64 runner took ~17 minutes (mostly `pnpm run build`,
  # which is CPU-bound and emulates very poorly); native arm64 runners
  # (free for public repos: https://github.blog/changelog/2025-08-07-arm64-hosted-runners-for-public-repositories-are-now-generally-available/)
  # build at native speed instead.
  docker_frontend_build:
    needs: docker_meta
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runs-on: ubuntu-latest
          - arch: arm64
            runs-on: ubuntu-24.04-arm
    runs-on: ${{ matrix.runs-on }}
    permissions:
      packages: write

    steps:
      - name: Acquire sources
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4 # zizmor: ignore[cache-poisoning]

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ github.token }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/frontend.Dockerfile
          target: prod
          platforms: linux/${{ matrix.arch }}
          labels: ${{ needs.docker_meta.outputs.labels }}
          outputs: type=image,name=ghcr.io/${{ env.IMAGE_NAME_FRONTEND }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=frontend-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=frontend-${{ matrix.arch }}
          provenance: false

      - name: Export digest
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          mkdir -p /tmp/digests
          touch "/tmp/digests/${DIGEST#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v7
        with:
          name: digests-${{ matrix.arch }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  # Combines the per-platform digests into a single multi-arch manifest under
  # the real tags, then deploys.
  docker_frontend_merge:
    needs: [ docker_meta, docker_frontend_build ]
    runs-on: ubuntu-latest
    permissions:
      packages: write

    steps:
      - name: Acquire sources
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Download digests
        uses: actions/download-artifact@v8
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4 # zizmor: ignore[cache-poisoning]

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ github.token }}

      - name: Create manifest list and push
        working-directory: /tmp/digests
        env:
          META_TAGS: ${{ needs.docker_meta.outputs.tags }}
          IMAGE_NAME: ${{ env.IMAGE_NAME_FRONTEND }}
        run: |
          tags=()
          while IFS= read -r tag; do
            [ -n "$tag" ] && tags+=("-t" "$tag")
          done <<< "$META_TAGS"
          refs=()
          for digest in *; do
            refs+=("ghcr.io/${IMAGE_NAME}@sha256:${digest}")
          done
          docker buildx imagetools create "${tags[@]}" "${refs[@]}"

      - name: Inspect image
        env:
          META_TAGS: ${{ needs.docker_meta.outputs.tags }}
        run: |
          first_tag=$(head -n1 <<< "$META_TAGS")
          docker buildx imagetools inspect "$first_tag"

      - name: Display git status
        run: |
          set -x
          git describe --tags
          git status

      - name: Deploy to Coolify
        run: |
          curl --fail --request GET \
            --header "Authorization: Bearer ${{ secrets.COOLIFY_API_TOKEN }}" \
            'https://coolify.eobs.org/api/v1/deploy?uuid=${{ secrets.COOLIFY_FRONTEND_UUID }}&force=false'
